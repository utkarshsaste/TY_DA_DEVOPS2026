<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My DevOps Website</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: white;
        }

        header {
            text-align: center;
            padding: 20px;
            background: #1e293b;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            background: #334155;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .hero {
            text-align: center;
            padding: 50px;
        }

        .hero button {
            margin-top: 10px;
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        .content {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 30%;
            text-align: center;
            margin: 10px;
        }

        footer {
            text-align: center;
            padding: 10px;
            background: #1e293b;
            margin-top: 20px;
        }
    </style>

</head>
<body>

    <header>
        <h1>Utkarsh Saste 🚀</h1>
        <p>DevOps & Web Developer</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section class="hero">
        <h2>Hello 👋</h2>
        <p>This is my first website deployed using GitHub.</p>
        <button>Explore</button>
    </section>

    <section class="content">
        <div class="card">
            <h3>About Me</h3>
            <p>I am learning DevOps and Web Development.</p>
        </div>

        <div class="card">
            <h3>My Skills</h3>
            <p>HTML, CSS, Git, GitHub, MySQL</p>
        </div>

        <div class="card">
            <h3>Projects</h3>
            <p>Student Portfolio, Blogging Website</p>
        </div>
    </section>

    <footer>
        <p>© 2026 Utkarsh Saste | Made with ❤️</p>
    </footer>

</body>
</html>
